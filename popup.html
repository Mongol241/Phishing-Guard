<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phishing Guard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: #1f2937;
      width: 320px;
      min-height: 200px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #fdf4ff, #fae8ff);
      border-bottom: 1px solid #f5d0fe;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { 
      font-size: 24px; 
      background: #fff;
      padding: 6px;
      border-radius: 12px;
      box-shadow: 0 2px 4px rgba(217, 70, 239, 0.1);
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 800;
      color: #c026d3;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: #a21caf;
      margin-top: 2px;
      font-weight: 600;
    }

    .status-badge {
      margin: 16px 16px 8px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      padding: 10px 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: blink 2s ease infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .status-text {
      font-size: 12px;
      color: #16a34a;
      font-weight: 700;
    }

    .info-section {
      padding: 10px 16px 14px;
    }

    .module-title {
      font-size: 11px; font-weight: 800; color: #d946ef;
      text-transform: uppercase; letter-spacing: 1px;
      padding: 8px 0 4px;
    }

    .info-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 6px 0;
      font-size: 12px;
      color: #4b5563;
    }
    .info-item span:first-child { flex-shrink: 0; }

    .actions {
      padding: 8px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-action {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      letter-spacing: 0.3px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #d946ef, #c026d3);
      color: #fff;
      box-shadow: 0 4px 12px rgba(217, 70, 239, 0.25);
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #e879f9, #d946ef);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(217, 70, 239, 0.35);
    }

    .btn-secondary {
      background: #fdf4ff;
      color: #c026d3;
      border: 1px solid #f5d0fe;
    }
    .btn-secondary:hover {
      background: #fae8ff;
      border-color: #f0abfc;
      transform: translateY(-1px);
    }

    .footer {
      text-align: center;
      font-size: 11px;
      color: #9ca3af;
      padding: 0 16px 16px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div class="header-text">
      <h1>Phishing Guard</h1>
      <p>AI-Powered Email Assistant</p>
    </div>
  </div>

  <div class="status-badge">
    <div class="status-dot"></div>
    <div class="status-text">All Systems Active</div>
  </div>

  <div class="info-section">
    <div class="module-title">🛡️ Security Module</div>
    <div class="info-item"><span>🔍</span><span>Auto-scans every email for threats</span></div>

    <div class="module-title" style="margin-top:8px">🤖 AI Reply & Inbox</div>
    <div class="info-item"><span>🎨</span><span>Priority color badges on all emails</span></div>
    <div class="info-item"><span>💬</span><span>Smart reply templates & auto-fill</span></div>
  </div>

  <div class="actions">
    <button class="btn-action btn-primary" id="summary-btn">📬 Yesterday's Summary</button>
    <button class="btn-action btn-secondary" id="scan-btn">🔎 Force Scan Current Email</button>
  </div>

  <div class="footer">Phishing Guard v1.0</div>

  <script>
    function triggerAction(eventName) {
      chrome.tabs.query({ active: true, currentWindow: true }, (tabs) => {
        if (tabs[0]) {
          chrome.scripting.executeScript({
            target: { tabId: tabs[0].id },
            func: (name) => document.dispatchEvent(new CustomEvent(name)),
            args: [eventName]
          });
        }
      });
    }

    document.getElementById('summary-btn').addEventListener('click', () => triggerAction('pg-show-summary'));
    document.getElementById('scan-btn').addEventListener('click', () => triggerAction('phishing-manual-scan'));
  </script>
</body>
</html>
